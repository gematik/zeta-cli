name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      # Builds + tests every module, including `:cli-sdk1_0` whose source mirrors `:cli`
      # but compiles + tests against the legacy SDK pin (`libs.versions.zeta-sdk-legacy`).
      # Any CLI source change that uses an API not present in the legacy SDK fails on
      # `:cli-sdk1_0` here rather than at launcher-load time.
      - name: Build & test
        run: ./gradlew build --stacktrace
      - name: Build the multi-SDK distribution
        run: ./gradlew assembleDist
      - name: Smoke-test the launcher
        run: |
          set -e
          DIST=$(find build/dist -mindepth 1 -maxdepth 1 -type d | head -n1)
          "$DIST/bin/zeta" version
          "$DIST/bin/zeta" sdk list
