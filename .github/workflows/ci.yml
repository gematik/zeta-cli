name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & test
        run: ./gradlew build --stacktrace
      # Compile the cli against each bundled SDK version so a CLI source change that uses
      # an API present in one but not the other fails CI here rather than at runtime
      # under the launcher's classloader chain.
      - name: Compile cli against each bundled SDK
        run: |
          set -e
          for v in $(awk -F'"' '/^zeta-sdk-bundled/ {print $2}' gradle/libs.versions.toml | tr ',' ' '); do
            echo "--- compileKotlin -PzetaSdkVersion=$v ---"
            ./gradlew :cli:compileKotlin -PzetaSdkVersion="$v" --stacktrace
          done
      - name: Build the multi-SDK distribution
        run: ./gradlew assembleDist
      - name: Smoke-test the launcher
        run: |
          set -e
          DIST=$(find build/dist -mindepth 1 -maxdepth 1 -type d | head -n1)
          "$DIST/bin/zeta" version
          "$DIST/bin/zeta" sdk list
