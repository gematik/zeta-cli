# zeta stress run profile — the whole run in one file.
#
# End-to-end order:  zeta stress preflight <this>  →  zeta stress popp get <this>  →  zeta stress run <this>
#   (a full parameter reference for every key is at the bottom of this file, commented out.)
#
# A small login-storm test against the plain ZETA Guard: a cohort whose tokens + ASL are wiped
# all re-login (authenticate). Moderate load, short duration — meant for a quick smoke, not a
# saturation test. Rates are requests/min; `warmup` runs once, then `cycle` repeats until
# `duration`. Keep rates near/below the box ceiling (~2350/min on the 2-core node) so the shape
# stays visible rather than flat-lining into backpressure.

title: Login storm — zeta-plain smoke
resource: https://zeta-plain.t20r.cloud
scope: zero:audience
concurrency: 50
insecure: true
duration: 2m
scenario: login-storm

# The client population: N institutions (SMC-B identities), each running 1..many OAuth clients.
# `zeta stress preflight stress-profile.yaml` registers it; `run` drives the whole of it (all clients
# expire and re-login). Total clients ≈ institutions × mean(clients-per-institution).
cohort:
  institutions: 200
  clients-per-institution: 1..3   # N, "a..b", or [a, b]; each institution registers a random count
  seed: 42                        # optional — reproducible fan-out

# PoPP tokens for `login-and-vsdm-storm`. `zeta stress popp get stress-profile.yaml` obtains, per
# roster identity, `per-identity` tokens by driving the kartos flow against eGK images in `egk-dir`,
# and stores them; `zeta stress popp export <dir>` writes them out as <insurant>-<telematik-id>.jwt.
popp:
  egk-dir: ./egk-images     # directory of eGK XML card images (fed to the kartos simulator)
  per-identity: 1           # tokens to obtain (top-up) per roster identity
  concurrency: 8            # parallel workers (each spawns a kartos subprocess per token)
  service-url: wss://popp.dev.poppservice.de/popp/practitioner/api/v1/token-generation-ehc
  kartos-bin: kartos        # path to the kartos executable (default: on PATH)
  scope: popp

warmup:
  name: warmup         # ease in below the ceiling
  rate: 120
  duration: 20s

cycle:
  - name: burst        # short push toward the ceiling
    rate: 1500
    duration: 30s
  - name: calm         # let it recover
    rate: 120
    duration: 30s

# ============================ full parameter reference ============================
# Every key the run loader understands, with its default. Uncomment/adjust as needed.
#
# --- target & identity ---
# title: My run                 # human-readable report heading (and browser-tab title)
# db: stress.db                 # SQLite state file (or pass --db on the command line)
# resource: https://…           # REQUIRED — resource origin (base URL)
# scope: zero:audience          # or a list:  scopes: [a, b]. Access-token scope the SDK requests.
#
# --- scenario ---
# scenario: login-storm         # login-storm | login-and-vsdm-storm | refresh-churn
#
# --- load / timing ---
# concurrency: 100              # max in-flight attempts + DB pool (coerced to 4..128)
# duration: 2m                  # total run (default = warmup + one cycle)
# attempt-timeout: 120          # seconds; per-attempt wall-clock cap → failure on stall
#
# --- TLS / environment (applied to every leg, including the VSDM read) ---
# insecure: false               # disable TLS verification (dev / self-signed only)
# ca-cert: ./corp-ca.pem        # or a list; extra PEM CAs on top of the JVM roots
# connect-timeout: 10           # seconds
# request-timeout: 30           # seconds
# asl-prod: false               # use the ASL production environment
#
# --- login-and-vsdm-storm ONLY: the authenticated read after login (REQUIRED for that scenario) ---
# request:
#   url: https://…/vsdservice/v1/vsdmbundle   # REQUIRED
#   method: GET                               # default GET
#   headers: { Accept: application/json }     # optional extra request headers
#   popp: true                                # attach the identity's PoPP token as the `PoPP` header;
#                                             #   strict — an identity with no token → recorded failure
#   expect-status: [200, 304]                 # success set (single int or list)
#   op: vsdm                                  # reporter label
#   # PoPP tokens are read from the DB (minted by `zeta stress popp get`), NOT the popp: block above.
#   # The `scope` above must be one the VSDM resource accepts, or the read returns an auth error.
#
# --- alternative load shape: breaking-point ramp (use INSTEAD of warmup/cycle) ---
# ramp:
#   start: 500          # req/min
#   step: 500
#   step-interval: 20   # seconds per step
#   ceiling: 5000
#   max-fail-pct: 10    # stop if the failure rate exceeds this
#   max-p99: 5000       # ms; stop if p99 latency exceeds this
