# zeta stress run profile — the whole run in one file.
#
#   zeta stress run stress-profile.yaml
#
# A small login-storm test against the plain ZETA Guard: a cohort whose tokens + ASL are wiped
# all re-login (authenticate). Moderate load, short duration — meant for a quick smoke, not a
# saturation test. Rates are requests/min; `warmup` runs once, then `cycle` repeats until
# `duration`. Keep rates near/below the box ceiling (~2350/min on the 2-core node) so the shape
# stays visible rather than flat-lining into backpressure.

resource: https://zeta-plain.t20r.cloud
scope: zero:audience
concurrency: 50
insecure: true
duration: 2m
scenario: login-storm

# The client population: N institutions (SMC-B identities), each running 1..many OAuth clients.
# `zeta stress preflight stress-profile.yaml` registers it; `run` drives the whole of it (all clients
# expire and re-login). Total clients ≈ institutions × mean(clients-per-institution).
cohort:
  institutions: 200
  clients-per-institution: 1..3   # N, "a..b", or [a, b]; each institution registers a random count
  seed: 42                        # optional — reproducible fan-out

warmup:
  name: warmup         # ease in below the ceiling
  rate: 120
  duration: 20s

cycle:
  - name: burst        # short push toward the ceiling
    rate: 1500
    duration: 30s
  - name: calm         # let it recover
    rate: 120
    duration: 30s
